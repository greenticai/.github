# REPO_MANIFEST.toml — Canonical registry of all Greentic Rust repos.
#
# Source of truth for: org assignment, toolchain variant, crate publish lists,
# version-track configuration, archive / dev-publish / weekly-stable flags,
# and binary-bifurcation classification.
#
# Tiers are NOT authoritative here. They are derived from the on-disk
# cross-repo Rust dependency graph by `dep-graph/build_graph.py`; the graph
# (`dep-graph/graph.json`) is the source of truth and `tier = N` here is a
# cached value. To resync after Cargo.toml changes:
#
#     python3 dep-graph/build_graph.py
#     # then propagate repos.<name>.tier from graph.json into this file.
#
# If a tier value here looks wrong, fix the underlying dependency in the
# offending Cargo.toml and rerun the graph — do NOT hand-edit `tier = N`
# to override.
#
# Used by: sync-toolchain.sh, onboard-repo.sh, branch-develop.sh,
#          sync-dev-publish.sh, nightly-develop.yml, weekly-stable-*.yml
#
# Fields:
#   org                      — GitHub org (greenticai | greentic-biz)
#   variant                  — Toolchain variant (host | wasm)
#   tier                     — Dependency tier (graph-derived). Lower tiers publish first.
#   publishes                — Ordered crate list for cargo publish. Empty = no publish.
#   version-track            — { from, to } for version bumping. Omit to skip bumping.
#   dev-publish-enabled      — Progressive rollout flag for nightly CodeArtifact builds.
#   weekly-stable-enabled    — Progressive rollout flag for weekly crates.io releases.
#   archived                 — true for read-only repos. All scripts skip these.
#   binary-crates            — Subset of `publishes` that ship a binary. On develop, each
#                              publishes as `<name>-dev` (Phase C of binary-bifurcation).
#                              Classification captured in .github/audits/binary-dual-role.md.
#   dual-role-binary-crates  — Subset of `binary-crates` that ALSO publish a library under
#                              the same `[package].name`. Library keeps publishing as `<name>`;
#                              binary gets a sibling `<name>-dev` copy-publish.
#
# Layout: sections grouped by graph-derived tier, alphabetical within tier.
# Archived repos are placed at the end regardless of tier.


