# REPO_MANIFEST.toml — Canonical registry of all Greentic Rust repos.
# Single source of truth for toolchain variants, dependency tiers, crate publish
# lists, and version-track configuration.
#
# Used by: sync-toolchain.sh, onboard-repo.sh, branch-develop.sh,
#          sync-dev-publish.sh, nightly-develop.yml, weekly-stable-*.yml
#
# Fields:
#   org                   — GitHub org (greenticai | greentic-biz)
#   variant               — Toolchain variant (host | wasm)
#   tier                  — Dependency tier (0-8). Lower tiers publish first.
#   publishes             — Ordered crate list for cargo publish. Empty = no publish.
#   version-track         — { from, to } for version bumping. Omit to skip bumping.
#   dev-publish-enabled   — Progressive rollout flag for nightly CodeArtifact builds.
#   weekly-stable-enabled — Progressive rollout flag for weekly crates.io releases.
#   archived              — true for read-only repos. All scripts skip these.

# ─── Tier 0 — Foundation ────────────────────────────────────────

[repos.greentic-types]
org = "greenticai"
variant = "host"
tier = 0
publishes = ["greentic-types-macros", "greentic-types"]
version-track = { from = "0.4", to = "0.5" }
dev-publish-enabled = true
weekly-stable-enabled = true

[repos.greentic-interfaces]
org = "greenticai"
variant = "host"
tier = 0
publishes = ["greentic-interfaces", "greentic-interfaces-guest", "greentic-interfaces-wasmtime", "greentic-interfaces-host"]
version-track = { from = "0.4", to = "0.5" }
dev-publish-enabled = true
weekly-stable-enabled = true

[repos.greentic-telemetry]
org = "greenticai"
variant = "host"
tier = 0
publishes = ["greentic-telemetry"]
version-track = { from = "0.4", to = "0.5" }
dev-publish-enabled = true
weekly-stable-enabled = true

[repos.greentic-i18n]
org = "greenticai"
variant = "host"
tier = 0
publishes = ["greentic-i18n-lib", "greentic-i18n-translator"]
version-track = { from = "0.4", to = "0.5" }
dev-publish-enabled = true
weekly-stable-enabled = true

[repos.serde-yaml-gtc]
org = "greenticai"
variant = "host"
tier = 0
publishes = ["serde_yaml_gtc"]
# No version-track: serde_yaml_gtc is at 2.5.x, separate version track.
# Bump scripts skip repos without version-track.
dev-publish-enabled = true
weekly-stable-enabled = true

