name: Host Crate CI

# Thin wrapper around `pr-ci.yml` with `variant: host`. The fmt/clippy/test/
# toolchain-check jobs live in pr-ci.yml; only the advisory semver-checks job
# stays inline here because pr-ci.yml deliberately excludes it (heavy gates
# moved to scheduled reusables per plans/binary-bifurcation.md Phase A).
#
# Input surface preserved verbatim for back-compat with ~30 callers. The real
# semver gate still lives in weekly-stable-prepare (comparing against the last
# v* tag at publish boundary); this workflow only emits an advisory warning.

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.95.0"
      clippy-args:
        description: "Arguments passed to cargo clippy"
        type: string
        default: "--workspace --all-targets --all-features -- -D warnings"
      test-args:
        description: "Arguments passed to cargo test"
        type: string
        default: "--workspace --all-features"
      run-semver-checks:
        description: "Run cargo-semver-checks in advisory mode (reports breaks as warnings, never blocks)"
        type: boolean
        default: false
      semver-checks-package:
        description: "Comma-separated list of packages to check (empty = all packages, which fails on unpublished crates)"
        type: string
        default: ""
      semver-baseline-rev:
        description: "Git ref to use as semver baseline (default: auto-resolve to latest vX.Y.Z tag)"
        type: string
        default: ""
      setup-script:
        description: "Optional shell commands to run before checks (e.g., ci/prefetch.sh)"
        type: string
        default: ""
      toolchain-variant:
        description: "Canonical toolchain variant (host or wasm) for drift check"
        type: string
        default: "host"
      checkout-submodules:
        description: "Checkout git submodules (false, true, or recursive)"
        type: string
        default: "false"

permissions:
  contents: read

jobs:
  pr-ci:
    # Delegate fmt/clippy/test/toolchain-check to the unified PR-CI baseline.
    # `run-dependency-review: false` preserves parity with this workflow's
    # pre-A.2 behavior (callers that want dep-review invoke dependency-review.yml
    # directly). Wrapping into pr-ci.yml cannot add it implicitly.
    #
    # `pull-requests: write` is forwarded even though dep-review is gated
    # off here: GitHub validates nested-reusable permissions at graph-build
    # time, before `if:` is evaluated, so pr-ci.yml's `dependency-review`
    # job (which statically declares `pull-requests: write`) fails startup
    # unless the caller chain grants it. Callers still opt in via their own
    # `permissions:` block — this line only avoids capping it back to none.
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/pr-ci.yml
    with:
      variant: host
      rust-version: ${{ inputs.rust-version }}
      clippy-args: ${{ inputs.clippy-args }}
      test-args: ${{ inputs.test-args }}
      setup-script: ${{ inputs.setup-script }}
      toolchain-variant: ${{ inputs.toolchain-variant }}
      checkout-submodules: ${{ inputs.checkout-submodules }}
      run-dependency-review: false

  semver-checks:
    # Advisory mode: reports breaking changes as warnings, never fails the job.
    # Kept inline because pr-ci.yml does not include semver-checks — the heavy
    # semver-checks path has its own reusable (nightly-semver-advisory.yml) on
    # a nightly schedule, but ~8 host-crate-ci.yml callers still opt into
    # advisory mode on PR via `run-semver-checks: true`. Those callers migrate
    # to the nightly reusable separately (binary-bifurcation.md A.4 Wave 2+).
    # The real semver gate lives in weekly-stable-prepare, which compares
    # against the last v* tag at publish boundary.
    if: ${{ inputs.run-semver-checks }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - name: Resolve semver baseline
        id: baseline
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.semver-baseline-rev }}" ]; then
            echo "ref=${{ inputs.semver-baseline-rev }}" >> "$GITHUB_OUTPUT"
            echo "Using explicit baseline: ${{ inputs.semver-baseline-rev }}"
            exit 0
          fi
          TAG="$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -n1 || true)"
          if [ -n "$TAG" ]; then
            echo "ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
            echo "Auto-resolved baseline to tag: ${TAG}"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "::warning::No vX.Y.Z tag found; cargo-semver-checks will fall back to the latest published version on the registry."
          fi
      - id: semver
        continue-on-error: true
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          rust-toolchain: manual
          package: ${{ inputs.semver-checks-package }}
          baseline-rev: ${{ steps.baseline.outputs.ref }}
      - name: Emit advisory
        if: steps.semver.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning title=Semver advisory::cargo-semver-checks detected a breaking change vs the current baseline. If intentional, plan to run start-next-minor.sh before the next stable cut. See plans/pre-release-minor-bump-lane.md."
