name: Host Crate CI

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.94.0"
      clippy-args:
        description: "Arguments passed to cargo clippy"
        type: string
        default: "--workspace --all-targets --all-features -- -D warnings"
      test-args:
        description: "Arguments passed to cargo test"
        type: string
        default: "--workspace --all-features"
      run-semver-checks:
        description: "Run cargo-semver-checks against last published version"
        type: boolean
        default: false
      semver-checks-package:
        description: "Comma-separated list of packages to check (empty = all packages, which fails on unpublished crates)"
        type: string
        default: ""
      setup-script:
        description: "Optional shell commands to run before checks (e.g., ci/prefetch.sh)"
        type: string
        default: ""
      toolchain-variant:
        description: "Canonical toolchain variant (host or wasm) for drift check"
        type: string
        default: "host"
      checkout-submodules:
        description: "Checkout git submodules (false, true, or recursive)"
        type: string
        default: "false"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  toolchain-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}
      - name: Check toolchain drift
        run: |
          VARIANT="${{ inputs.toolchain-variant }}"
          BASE="https://raw.githubusercontent.com/greenticai/.github/main/toolchain"

          curl -sL "${BASE}/${VARIANT}/rust-toolchain.toml" -o /tmp/canonical-toolchain.toml
          curl -sL "${BASE}/rustfmt.toml" -o /tmp/canonical-rustfmt.toml

          DRIFT=0
          if ! diff -q rust-toolchain.toml /tmp/canonical-toolchain.toml >/dev/null 2>&1; then
            echo "::warning::rust-toolchain.toml differs from canonical ${VARIANT} variant"
            diff rust-toolchain.toml /tmp/canonical-toolchain.toml || true
            DRIFT=1
          fi
          if ! diff -q rustfmt.toml /tmp/canonical-rustfmt.toml >/dev/null 2>&1; then
            echo "::warning::rustfmt.toml differs from canonical"
            diff rustfmt.toml /tmp/canonical-rustfmt.toml || true
            DRIFT=1
          fi
          # Warning-only initially; upgrade to exit $DRIFT after stabilization

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt, clippy
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo clippy ${{ inputs.clippy-args }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo test ${{ inputs.test-args }}

  semver-checks:
    if: ${{ inputs.run-semver-checks }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          rust-toolchain: manual
          package: ${{ inputs.semver-checks-package }}
