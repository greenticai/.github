name: Nightly Coverage

# Reusable coverage workflow. Installs the canonical toolchain
# (cargo-llvm-cov, cargo-nextest, greentic-dev), runs the coverage command,
# uploads the report as a workflow artifact.
#
# Typical caller (schedule):
#   on:
#     schedule: [{ cron: "41 3 * * *" }]
#     workflow_dispatch:
#   jobs:
#     coverage:
#       uses: greenticai/.github/.github/workflows/nightly-coverage.yml@main
#       secrets: inherit
#
# Repos with a coverage policy file pass `coverage-command: "greentic-dev coverage --policy-file coverage-policy.json"`.
# Repos that bypass greentic-dev can pass the raw cargo-llvm-cov invocation.
#
# Slack alerting for scheduled failures is handled by the per-repo
# `.github/workflows/notify-scheduled-failures.yml` catch-all (option-3
# rollout, 2026-04-23) — no inline notify-failure job here.

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.95.0"
      coverage-command:
        description: "Coverage invocation. Defaults to 'greentic-dev coverage'. Override to add --policy-file or switch to raw cargo-llvm-cov."
        type: string
        default: "greentic-dev coverage"
      install-greentic-dev:
        description: "Install greentic-dev (provides the coverage wrapper). Disable if using raw cargo-llvm-cov."
        type: boolean
        default: true
      install-cargo-nextest:
        description: "Install cargo-nextest (used by greentic-dev coverage)"
        type: boolean
        default: true
      setup-script:
        description: "Optional shell commands to run before coverage (e.g., fixtures prep)"
        type: string
        default: ""
      checkout-submodules:
        description: "Checkout git submodules (false, true, or recursive)"
        type: string
        default: "false"
      artifact-name:
        description: "Name of the uploaded coverage artifact"
        type: string
        default: "nightly-coverage-report"
      artifact-path:
        description: "Path glob for the coverage artifact upload"
        type: string
        default: "target/coverage/"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 60

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Change-gate: on a `schedule` event, short-circuits downstream jobs when
  # HEAD SHA matches the last successful scheduled run of the same workflow.
  # `workflow_dispatch` and first-ever runs always proceed. Inlined rather
  # than extracted into a composite action so the reusable stays self-
  # contained (avoids cross-repo `@main` resolution problems when the
  # action lives in the same repo as the reusable that references it).
  gate:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW: ${{ github.workflow }}
          HEAD_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          emit() {
            local should_run="$1"
            local reason="$2"
            echo "should-run=${should_run}" >> "${GITHUB_OUTPUT}"
            {
              echo "## Nightly gate"
              echo ""
              echo "- **Event:** \`${EVENT_NAME}\`"
              echo "- **Workflow:** \`${WORKFLOW}\`"
              echo "- **HEAD:** \`${HEAD_SHA}\`"
              echo "- **Decision:** \`${should_run}\` — ${reason}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "gate: should-run=${should_run} (${reason})"
          }

          if [ "${EVENT_NAME}" != "schedule" ]; then
            emit true "non-schedule event (${EVENT_NAME:-unknown}) always runs"
            exit 0
          fi

          last_sha=$(gh run list \
            --repo "${REPO}" \
            --workflow "${WORKFLOW}" \
            --status success \
            --event schedule \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""' 2>/dev/null || echo "")

          if [ -z "${last_sha}" ]; then
            emit true "no prior successful scheduled run — establishing baseline"
            exit 0
          fi

          if [ "${last_sha}" = "${HEAD_SHA}" ]; then
            emit false "unchanged since last successful scheduled run (${last_sha})"
            exit 0
          fi

          emit true "changed since last successful scheduled run (${last_sha} → ${HEAD_SHA})"

  coverage:
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-llvm-cov
        run: cargo binstall -y cargo-llvm-cov

      - name: Install cargo-nextest
        if: ${{ inputs.install-cargo-nextest }}
        run: cargo binstall -y cargo-nextest

      - name: Install greentic-dev
        if: ${{ inputs.install-greentic-dev }}
        run: cargo binstall -y greentic-dev

      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}

      - name: Run coverage
        run: ${{ inputs.coverage-command }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          if-no-files-found: ignore
