name: WASM Component CI

# Thin wrapper around `pr-ci.yml` with `variant: wasm`. The fmt/clippy/test/
# wasm/toolchain-check jobs live in pr-ci.yml; this file only translates the
# historical input surface to pr-ci.yml inputs. See plans/binary-bifurcation.md
# Phase A.2.
#
# Input surface preserved verbatim for back-compat with ~14 callers (including
# dev-publish workflows that reuse this for workflow_dispatch-only runs).

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.95.0"
      clippy-args:
        description: "Arguments passed to cargo clippy"
        type: string
        default: "--workspace --all-targets -- -D warnings"
      test-args:
        description: "Arguments passed to cargo test"
        type: string
        default: "--workspace --all-targets"
      setup-script:
        description: "Optional shell commands to run before checks (e.g., ci/prefetch_canonical_wit.sh)"
        type: string
        default: ""
      use-cargo-component:
        description: "Use 'cargo component build' instead of 'cargo build' for the WASM target"
        type: boolean
        default: false
      cargo-component-version:
        description: "cargo-component version to install (only when use-cargo-component is true)"
        type: string
        default: "0.21.1"
      wasm-check-args:
        description: "Arguments passed to cargo check for WASM target (e.g., '-p component-qa --target wasm32-wasip2')"
        type: string
        default: "--target wasm32-wasip2"
      wasm-build-args:
        description: "Arguments passed to cargo build for WASM target (e.g., '-p component-qa --target wasm32-wasip2 --release')"
        type: string
        default: "--target wasm32-wasip2 --release"
      validate-component:
        description: "Validate WASM output is a valid WIT component via wasm-tools"
        type: boolean
        default: true
      wasm-validate-glob:
        description: "Glob pattern for .wasm files to validate"
        type: string
        default: "target/wasm32-wasip2/release/*.wasm"
      toolchain-variant:
        description: "Canonical toolchain variant (host or wasm) for drift check"
        type: string
        default: "wasm"

permissions:
  contents: read

jobs:
  pr-ci:
    # Delegate fmt/clippy/test/wasm/toolchain-check to the unified PR-CI
    # baseline. `run-dependency-review: false` preserves parity with this
    # workflow's pre-A.2 behavior (callers that want dep-review invoke
    # dependency-review.yml directly).
    #
    # `pull-requests: write` is forwarded even though dep-review is gated
    # off here: GitHub validates nested-reusable permissions at graph-build
    # time, before `if:` is evaluated, so pr-ci.yml's `dependency-review`
    # job (which statically declares `pull-requests: write`) fails startup
    # unless the caller chain grants it. Callers still opt in via their own
    # `permissions:` block — this line only avoids capping it back to none.
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/pr-ci.yml
    with:
      variant: wasm
      rust-version: ${{ inputs.rust-version }}
      clippy-args: ${{ inputs.clippy-args }}
      test-args: ${{ inputs.test-args }}
      setup-script: ${{ inputs.setup-script }}
      toolchain-variant: ${{ inputs.toolchain-variant }}
      use-cargo-component: ${{ inputs.use-cargo-component }}
      cargo-component-version: ${{ inputs.cargo-component-version }}
      wasm-check-args: ${{ inputs.wasm-check-args }}
      wasm-build-args: ${{ inputs.wasm-build-args }}
      validate-component: ${{ inputs.validate-component }}
      wasm-validate-glob: ${{ inputs.wasm-validate-glob }}
      run-dependency-review: false
