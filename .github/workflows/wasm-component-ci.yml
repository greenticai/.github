name: WASM Component CI

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.91.0"
      clippy-args:
        description: "Arguments passed to cargo clippy"
        type: string
        default: "--workspace --all-targets -- -D warnings"
      test-args:
        description: "Arguments passed to cargo test"
        type: string
        default: "--workspace --all-targets"
      setup-script:
        description: "Optional shell commands to run before checks (e.g., ci/prefetch_canonical_wit.sh)"
        type: string
        default: ""
      validate-component:
        description: "Validate WASM output is a valid WIT component via wasm-tools"
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo clippy ${{ inputs.clippy-args }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo test ${{ inputs.test-args }}

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - name: Check (wasm32-wasip2)
        run: cargo check --target wasm32-wasip2
      - name: Build (wasm32-wasip2, release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Install wasm-tools
        if: ${{ inputs.validate-component }}
        uses: cargo-bins/cargo-binstall@main
        with:
          tool: wasm-tools
      - name: Validate component
        if: ${{ inputs.validate-component }}
        run: |
          for wasm in target/wasm32-wasip2/release/*.wasm; do
            [ -f "$wasm" ] || continue
            echo "Validating: $wasm"
            wasm-tools component wit "$wasm"
          done
