name: WASM Component CI

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.91.0"
      clippy-args:
        description: "Arguments passed to cargo clippy"
        type: string
        default: "--workspace --all-targets -- -D warnings"
      test-args:
        description: "Arguments passed to cargo test"
        type: string
        default: "--workspace --all-targets"
      setup-script:
        description: "Optional shell commands to run before checks (e.g., ci/prefetch_canonical_wit.sh)"
        type: string
        default: ""
      use-cargo-component:
        description: "Use 'cargo component build' instead of 'cargo build' for the WASM target"
        type: boolean
        default: false
      cargo-component-version:
        description: "cargo-component version to install (only when use-cargo-component is true)"
        type: string
        default: "0.21.1"
      wasm-check-args:
        description: "Arguments passed to cargo check for WASM target (e.g., '-p component-qa --target wasm32-wasip2')"
        type: string
        default: "--target wasm32-wasip2"
      wasm-build-args:
        description: "Arguments passed to cargo build for WASM target (e.g., '-p component-qa --target wasm32-wasip2 --release')"
        type: string
        default: "--target wasm32-wasip2 --release"
      validate-component:
        description: "Validate WASM output is a valid WIT component via wasm-tools"
        type: boolean
        default: true
      wasm-validate-glob:
        description: "Glob pattern for .wasm files to validate"
        type: string
        default: "target/wasm32-wasip2/release/*.wasm"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo clippy ${{ inputs.clippy-args }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - run: cargo test ${{ inputs.test-args }}

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}
      - name: Install cargo-binstall
        if: ${{ inputs.use-cargo-component || inputs.validate-component }}
        uses: taiki-e/install-action@cargo-binstall
      - name: Ensure cargo bin path is on PATH
        if: ${{ inputs.use-cargo-component || inputs.validate-component }}
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install cargo-component
        if: ${{ inputs.use-cargo-component }}
        run: cargo binstall -y cargo-component@${{ inputs.cargo-component-version }}
      - name: Check (wasm32-wasip2)
        run: |
          if [ "${{ inputs.use-cargo-component }}" = "true" ]; then
            cargo component check ${{ inputs.wasm-check-args }}
          else
            cargo check ${{ inputs.wasm-check-args }}
          fi
      - name: Build (wasm32-wasip2, release)
        run: |
          if [ "${{ inputs.use-cargo-component }}" = "true" ]; then
            cargo component build ${{ inputs.wasm-build-args }}
          else
            cargo build ${{ inputs.wasm-build-args }}
          fi
      - name: Install wasm-tools
        if: ${{ inputs.validate-component }}
        run: cargo binstall -y wasm-tools --force
      - name: Verify wasm-tools
        if: ${{ inputs.validate-component }}
        run: |
          echo "PATH=$PATH"
          ls -la "$HOME/.cargo/bin" || true
          command -v wasm-tools
          wasm-tools --version
      - name: Validate component
        if: ${{ inputs.validate-component }}
        run: |
          set -euo pipefail
          command -v wasm-tools >/dev/null 2>&1 || {
            echo "::error::wasm-tools missing from PATH=$PATH"
            exit 127
          }
          count=0
          for wasm in ${{ inputs.wasm-validate-glob }}; do
            [ -f "$wasm" ] || continue
            echo "Validating: $wasm"
            wasm-tools validate "$wasm"
            if wasm-tools component wit "$wasm" > /dev/null 2>&1; then
              echo "  ✓ valid WIT component"
            else
              echo "  ✓ valid core module (not a component)"
            fi
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "::error::No .wasm files found matching ${{ inputs.wasm-validate-glob }}"
            exit 1
          fi
          echo "Validated $count module(s)"
