name: Codex Security Fix

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch to scan and patch (only for manual dispatch)"
        type: string
        default: ""
      max_alerts:
        description: "Maximum open alerts per source to include"
        type: string
        default: "20"
      include_all_alerts:
        description: "Fetch all repository-wide alerts even on PR trigger"
        type: boolean
        default: false
    secrets:
      GH_PAT:
        description: "Personal access token (optional, falls back to GITHUB_TOKEN)"
        required: false
      OPENAI_API_KEY:
        description: "OpenAI API key for Codex remediation"
        required: false
      CODEX_OPENAI_API_KEY:
        description: "Alternative Codex API key"
        required: false

permissions:
  contents: read

jobs:
  codex-fix:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: read
    steps:
      - name: Check Codex availability
        id: codex_available
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_OPENAI_API_KEY: ${{ secrets.CODEX_OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          if [ -n "${OPENAI_API_KEY:-}" ] || [ -n "${CODEX_OPENAI_API_KEY:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Codex API key is not configured; skipping Codex remediation."
          fi

      - name: Loop guard – skip if triggered by any Codex remediation commit
        id: loop_guard
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          COMMIT_MSG=$(gh api \
            "/repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}" \
            --jq '.commit.message' 2>/dev/null || echo "")
          if echo "$COMMIT_MSG" | grep -qE "^chore\((security|semver|deps)\): codex remediation"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Head commit is a Codex remediation commit – skipping to prevent loop."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.codex_available.outputs.enabled == 'true' && steps.loop_guard.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Fetch open security alerts
        if: steps.codex_available.outputs.enabled == 'true' && steps.loop_guard.outputs.skip != 'true'
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          MAX_ALERTS: ${{ inputs.max_alerts }}
          INCLUDE_ALL: ${{ inputs.include_all_alerts }}
          IS_PR: ${{ github.event.pull_request && 'true' || 'false' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${IS_PR}" == "true" ] && [ "${INCLUDE_ALL}" != "true" ]; then
            # Skip Dependabot alerts on PRs (dependency-review workflow handles those)
            echo "[]" > all-dependabot-alerts.json
            echo "[]" > dependabot-alerts.json

            # Fetch Code Scanning alerts (produced by CodeQL runs on main)
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${OWNER}/${REPO}/code-scanning/alerts?state=open&per_page=100" \
              > all-code-scanning-alerts.json || echo "[]" > all-code-scanning-alerts.json

            # Get files changed in this PR
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" \
              --jq '.[].filename' > pr-changed-files.txt || echo "" > pr-changed-files.txt

            # Filter code scanning alerts to only those in PR-changed files
            jq --rawfile changed_files pr-changed-files.txt '
              ($changed_files | split("\n") | map(select(. != ""))) as $files |
              [ .[] | select(.most_recent_instance.location.path as $p | $files | any(. == $p)) ]
            ' all-code-scanning-alerts.json > pr-code-scanning-filtered.json \
              || echo "[]" > pr-code-scanning-filtered.json

            # Apply max_alerts limit
            jq ".[0:(${MAX_ALERTS}|tonumber)]" pr-code-scanning-filtered.json > code-scanning-alerts.json

            CODE_COUNT=$(jq 'length' code-scanning-alerts.json)

            jq -n \
              --slurpfile dependabot dependabot-alerts.json \
              --slurpfile code_scanning code-scanning-alerts.json \
              '{dependabot: $dependabot[0], code_scanning: $code_scanning[0]}' > security-alerts.json

            echo "count=${CODE_COUNT}" >> "$GITHUB_OUTPUT"
            echo "Found ${CODE_COUNT} Code Scanning alerts in PR-changed files (filtered from $(jq 'length' all-code-scanning-alerts.json) total)"
            exit 0
          fi

          # Fetch Dependabot alerts
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO}/dependabot/alerts?state=open&per_page=100" > all-dependabot-alerts.json || echo "[]" > all-dependabot-alerts.json
          jq ".[0:(${MAX_ALERTS}|tonumber)]" all-dependabot-alerts.json > dependabot-alerts.json

          # Fetch Code Scanning alerts
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO}/code-scanning/alerts?state=open&per_page=100" > all-code-scanning-alerts.json || echo "[]" > all-code-scanning-alerts.json
          jq ".[0:(${MAX_ALERTS}|tonumber)]" all-code-scanning-alerts.json > code-scanning-alerts.json

          DEP_COUNT=$(jq 'length' dependabot-alerts.json)
          CODE_COUNT=$(jq 'length' code-scanning-alerts.json)
          TOTAL_COUNT=$((DEP_COUNT + CODE_COUNT))

          jq -n \
            --slurpfile dependabot dependabot-alerts.json \
            --slurpfile code_scanning code-scanning-alerts.json \
            '{dependabot: $dependabot[0], code_scanning: $code_scanning[0]}' > security-alerts.json

          echo "count=${TOTAL_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${DEP_COUNT} open Dependabot alerts and ${CODE_COUNT} open Code Scanning alerts"

      - name: Build Codex prompt
        if: steps.codex_available.outputs.enabled == 'true' && steps.loop_guard.outputs.skip != 'true' && (steps.alerts.outputs.count != '0' || github.event.pull_request)
        env:
          IS_PR: ${{ github.event.pull_request && 'true' || 'false' }}
        run: |
          set -euo pipefail
          cat > codex-prompt.txt <<'PROMPT'
          You are operating in a CI environment as a Security Reviewer.

          Task:
          1) Analyze the security alerts listed below.
          2) Apply minimal, safe fixes to remediate vulnerabilities.
          3) Write SECURITY_FIX_REPORT.md summarizing your actions.

          Security alerts JSON:
          PROMPT

          cat security-alerts.json >> codex-prompt.txt

          # Add compact CodeQL section for PRs with filtered alerts
          if [ "${IS_PR}" == "true" ] && [ -f code-scanning-alerts.json ] && [ "$(jq 'length' code-scanning-alerts.json 2>/dev/null)" -gt 0 ]; then
            cat >> codex-prompt.txt <<'CODEQL_SECTION'

          CodeQL Code Scanning Alerts (filtered to files changed in this PR):
          The following alerts were found by CodeQL static analysis in files touched by this PR.
          Each alert includes the file path, line range, rule ID, and description.
          Please review and fix these issues in the relevant files.
          CODEQL_SECTION
            jq '[.[] | {
              rule: .rule.id,
              severity: .rule.security_severity_level,
              description: .rule.description,
              file: .most_recent_instance.location.path,
              start_line: .most_recent_instance.location.start_line,
              end_line: .most_recent_instance.location.end_line,
              message: .most_recent_instance.message.text
            }]' code-scanning-alerts.json >> codex-prompt.txt
          fi

      - name: Run Codex remediation
        if: steps.codex_available.outputs.enabled == 'true' && steps.loop_guard.outputs.skip != 'true' && (steps.alerts.outputs.count != '0' || github.event.pull_request)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY || secrets.CODEX_OPENAI_API_KEY }}
          prompt-file: codex-prompt.txt
          codex-args: '["--full-auto"]'

      - name: Commit and push fixes
        if: steps.codex_available.outputs.enabled == 'true' && steps.loop_guard.outputs.skip != 'true' && (steps.alerts.outputs.count != '0' || github.event.pull_request)
        env:
          BRANCH: ${{ github.event.pull_request.head.ref || inputs.branch }}
        run: |
          set -euo pipefail
          if git diff --quiet && [ ! -f SECURITY_FIX_REPORT.md ]; then
            echo "No changes created by Codex"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -u
          git commit -m "chore(security): codex remediation for security alerts" || echo "No changes to commit"
          git push origin "HEAD:${BRANCH}"

      - name: Post Codex Review
        if: steps.codex_available.outputs.enabled == 'true' && steps.loop_guard.outputs.skip != 'true' && steps.alerts.outputs.count != '0' && github.event.pull_request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          if [ -f SECURITY_FIX_REPORT.md ]; then
            echo "Posting security fix report to ${PR_URL}"
            gh pr review "${PR_URL}" --comment --body-file SECURITY_FIX_REPORT.md
          fi

      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-security-run
          path: |
            all-dependabot-alerts.json
            all-code-scanning-alerts.json
            dependabot-alerts.json
            code-scanning-alerts.json
            pr-code-scanning-filtered.json
            pr-changed-files.txt
            security-alerts.json
            codex-prompt.txt
            SECURITY_FIX_REPORT.md
          if-no-files-found: ignore
