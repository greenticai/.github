name: Nightly Perf

# Scheduled perf reusable. Runs the perf_scaling / perf_timeout guards,
# then a criterion bench smoke run, then uploads the criterion output as
# an artifact for trend tracking.
#
# Typical caller (schedule):
#   on:
#     schedule: [{ cron: "33 3 * * *" }]
#     workflow_dispatch:
#   jobs:
#     perf:
#       uses: greenticai/.github/.github/workflows/nightly-perf.yml@main
#       with:
#         test-args: "-p greentic-component --features cli --test perf_scaling --test perf_timeout --locked"
#         bench-args: "-p greentic-component --features cli --bench perf --locked -- --sample-size 10"
#       secrets: inherit
#
# Callers should pass `secrets: inherit` so SLACK_WEBHOOK_RELEASE_ALERTS
# (org-level) flows through for the on-failure notification. Without it,
# the notify step emits a ::warning:: instead of a Slack message.

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.95.0"
      test-args:
        description: "Arguments passed to cargo test (perf guards). Empty skips the guard step."
        type: string
        default: "--workspace --test perf_scaling --test perf_timeout"
      bench-args:
        description: "Arguments passed to cargo bench. Empty skips the bench step."
        type: string
        default: "--workspace --bench perf -- --sample-size 10"
      setup-script:
        description: "Optional shell commands to run before perf steps (e.g., fixture generation)"
        type: string
        default: ""
      checkout-submodules:
        description: "Checkout git submodules (false, true, or recursive)"
        type: string
        default: "false"
      upload-criterion-artifact:
        description: "Upload target/criterion as a workflow artifact"
        type: boolean
        default: true
      criterion-artifact-name:
        description: "Name of the criterion artifact"
        type: string
        default: "nightly-criterion"
      criterion-artifact-path:
        description: "Path glob for the criterion artifact"
        type: string
        default: "target/criterion"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 60
    secrets:
      SLACK_WEBHOOK_RELEASE_ALERTS:
        description: "Slack webhook for #ci-alerts. Optional; callers should `secrets: inherit` to pass the org-level secret through."
        required: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Change-gate: on a `schedule` event, short-circuits downstream jobs when
  # HEAD SHA matches the last successful scheduled run of the same workflow.
  # `workflow_dispatch` and first-ever runs always proceed. Inlined rather
  # than extracted into a composite action so the reusable stays self-
  # contained (avoids cross-repo `@main` resolution problems when the
  # action lives in the same repo as the reusable that references it).
  gate:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW: ${{ github.workflow }}
          HEAD_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          emit() {
            local should_run="$1"
            local reason="$2"
            echo "should-run=${should_run}" >> "${GITHUB_OUTPUT}"
            {
              echo "## Nightly gate"
              echo ""
              echo "- **Event:** \`${EVENT_NAME}\`"
              echo "- **Workflow:** \`${WORKFLOW}\`"
              echo "- **HEAD:** \`${HEAD_SHA}\`"
              echo "- **Decision:** \`${should_run}\` — ${reason}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "gate: should-run=${should_run} (${reason})"
          }

          if [ "${EVENT_NAME}" != "schedule" ]; then
            emit true "non-schedule event (${EVENT_NAME:-unknown}) always runs"
            exit 0
          fi

          last_sha=$(gh run list \
            --repo "${REPO}" \
            --workflow "${WORKFLOW}" \
            --status success \
            --event schedule \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""' 2>/dev/null || echo "")

          if [ -z "${last_sha}" ]; then
            emit true "no prior successful scheduled run — establishing baseline"
            exit 0
          fi

          if [ "${last_sha}" = "${HEAD_SHA}" ]; then
            emit false "unchanged since last successful scheduled run (${last_sha})"
            exit 0
          fi

          emit true "changed since last successful scheduled run (${last_sha} → ${HEAD_SHA})"

  perf:
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - uses: Swatinem/rust-cache@v2

      - if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}

      - name: Run perf guard tests
        if: inputs.test-args != ''
        run: cargo test ${{ inputs.test-args }}

      - name: Run criterion benchmark smoke
        if: inputs.bench-args != ''
        run: cargo bench ${{ inputs.bench-args }}

      - name: Upload criterion artifact
        if: ${{ always() && inputs.upload-criterion-artifact && inputs.bench-args != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.criterion-artifact-name }}
          path: ${{ inputs.criterion-artifact-path }}
          if-no-files-found: ignore

  notify-failure:
    needs: [gate, perf]
    if: failure() && github.event_name == 'schedule'
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow-name: nightly-perf
      repo: ${{ github.repository }}
      step: perf
      error: "Nightly perf run failed — criterion guards or bench smoke regressed."
    secrets: inherit
