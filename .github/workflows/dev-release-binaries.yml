name: Dev Release Binaries

# Reusable workflow that builds binaries for the 6 supported targets on a
# develop-lane commit, packages them with names matching what cargo-binstall
# expects for the `<crate>-dev` CodeArtifact alias, creates (or reuses) a
# prerelease GitHub Release tagged `v<dev-version>`, and uploads the archives.
#
# Phase C.4 of plans/binary-bifurcation.md. Pairs with dev-publish.yml (which
# publishes the `<crate>-dev` crate to CodeArtifact) so that:
#
#   cargo binstall <crate>-dev --registry corp-artifacts-greentic
#
# resolves the binstall metadata in the CodeArtifact crate, computes the
# archive URL from { repo } + v{ version } + { name = <crate>-dev } + { target },
# and downloads the matching archive from this release.
#
# Called from per-repo caller workflows like:
#
#   jobs:
#     publish:
#       uses: greenticai/.github/.github/workflows/dev-publish.yml@main
#       with: { crates: ..., binary-crates: ..., dual-role-binary-crates: ... }
#       secrets: inherit
#     binaries:
#       needs: publish
#       uses: greenticai/.github/.github/workflows/dev-release-binaries.yml@main
#       with:
#         package: greentic-setup
#         version: ${{ needs.publish.outputs.version }}

on:
  workflow_call:
    inputs:
      package:
        description: "Original cargo package name as it appears in the committed Cargo.toml (e.g. 'greentic-setup'). Used for `cargo build -p`."
        required: true
        type: string
      binary:
        description: "Original binary name as it appears in [[bin]].name (or defaults to package for auto-discovered bins). If omitted, uses `package`."
        required: false
        type: string
        default: ""
      version:
        description: "Stamped dev version (e.g. '0.5.24824839949'). Typically passed from the paired dev-publish job's `version` output."
        required: true
        type: string
      rust-version:
        description: "Rust toolchain version"
        required: false
        type: string
        default: "1.95.0"
      extra-files:
        description: "Newline-separated list of repo-root files to include alongside the binary in the archive (e.g. README.md, LICENSE)"
        required: false
        type: string
        default: ""
      windows-archive-format:
        description: "Archive format for Windows targets: 'tgz' or 'zip'"
        required: false
        type: string
        default: "tgz"

permissions:
  contents: write

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os: linux
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os: macos
          - runner: macos-15
            target: aarch64-apple-darwin
            os: macos
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            os: windows
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            os: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dev-release-binaries-${{ matrix.target }}

      - name: Resolve binary + dev-name
        id: names
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          BINARY: ${{ inputs.binary }}
        run: |
          set -euo pipefail
          binary="${BINARY:-$PACKAGE}"
          dev_name="${PACKAGE}-dev"
          echo "binary=${binary}" >> "$GITHUB_OUTPUT"
          echo "dev_name=${dev_name}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PACKAGE: ${{ inputs.package }}
          BINARY: ${{ steps.names.outputs.binary }}
        run: |
          cargo build --release --locked \
            --target "$TARGET" \
            --package "$PACKAGE" \
            --bin "$BINARY"

      - name: Package archive (tgz)
        if: matrix.os != 'windows' || inputs.windows-archive-format == 'tgz'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ inputs.version }}
          BINARY: ${{ steps.names.outputs.binary }}
          DEV_NAME: ${{ steps.names.outputs.dev_name }}
          EXTRA_FILES: ${{ inputs.extra-files }}
          OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          bin_suffix=""
          if [[ "$OS" == "windows" ]]; then
            bin_suffix=".exe"
          fi
          # Archive stem uses the DEV package name so cargo-binstall's
          # { name } substitution matches (name = <crate>-dev on CodeArtifact).
          stem="${DEV_NAME}-v${VERSION}-${TARGET}"
          mkdir -p "dist/${stem}"
          # Binary inside the archive is renamed to the dev name so
          # binstall's { bin } substitution (which reads [[bin]].name from
          # the rewritten -dev crate on CodeArtifact) matches the file.
          cp "target/${TARGET}/release/${BINARY}${bin_suffix}" \
             "dist/${stem}/${DEV_NAME}${bin_suffix}"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -f "$f" ]; then
              cp "$f" "dist/${stem}/"
            else
              echo "::warning::extra-file not found: $f"
            fi
          done <<< "$EXTRA_FILES"
          tar -C dist -czf "dist/${stem}.tgz" "${stem}"
          rm -rf "dist/${stem}"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${stem}.tgz" > "${stem}.tgz.sha256")
          else
            (cd dist && shasum -a 256 "${stem}.tgz" > "${stem}.tgz.sha256")
          fi

      - name: Package archive (zip)
        if: matrix.os == 'windows' && inputs.windows-archive-format == 'zip'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ inputs.version }}
          BINARY: ${{ steps.names.outputs.binary }}
          DEV_NAME: ${{ steps.names.outputs.dev_name }}
          EXTRA_FILES: ${{ inputs.extra-files }}
        run: |
          $ErrorActionPreference = 'Stop'
          $stem = "$env:DEV_NAME-v$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$stem" | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BINARY.exe" "dist/$stem/$env:DEV_NAME.exe"
          if ($env:EXTRA_FILES) {
            foreach ($f in $env:EXTRA_FILES -split "`n") {
              $f = $f.Trim()
              if ($f -and (Test-Path $f)) {
                Copy-Item $f "dist/$stem/"
              } elseif ($f) {
                Write-Host "::warning::extra-file not found: $f"
              }
            }
          }
          Compress-Archive -Path "dist/$stem/*" -DestinationPath "dist/$stem.zip" -Force
          Remove-Item -Recurse -Force "dist/$stem"
          $hash = (Get-FileHash "dist/$stem.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$stem.zip.sha256" -Value "$hash  $stem.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: dev-release-binaries-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  attach-to-release:
    name: Attach binaries to dev Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dev-release-binaries-*
          merge-multiple: true
          path: .dist-staging

      - name: Ensure dev prerelease exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing (idempotent)"
          else
            # Dev releases are prerelease + not latest so they don't
            # displace stable release visibility on the repo page. Tag
            # is created at github.sha (the develop commit that triggered
            # this workflow) so binstall downloads correspond exactly to
            # the code state that produced the published crate.
            gh release create "$tag" \
              --target "$SHA" \
              --title "$tag (dev build)" \
              --notes "Automated dev-lane build from develop. Paired with \`$(gh repo view --json name -q .name)-dev@${VERSION}\` on CodeArtifact." \
              --prerelease \
              --latest=false
          fi

      - name: Upload archives to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          shopt -s nullglob
          files=(.dist-staging/*.tgz .dist-staging/*.zip .dist-staging/*.sha256)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No archives found in .dist-staging/"
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
