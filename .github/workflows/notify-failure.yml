name: Notify Failure

on:
  workflow_call:
    inputs:
      workflow-name:
        description: "Name of the failed workflow (e.g., dev-publish, weekly-stable)"
        required: true
        type: string
      repo:
        description: "Repository name (e.g., greentic-types)"
        required: false
        type: string
        default: ""
      tier:
        description: "Tier number"
        required: false
        type: string
        default: ""
      step:
        description: "Step that failed (e.g., publish, build-test)"
        required: false
        type: string
        default: ""
      error:
        description: "Error summary"
        required: false
        type: string
        default: ""
      details:
        description: "Additional multiline details to append to the message"
        required: false
        type: string
        default: ""
      job-url:
        description: "Direct link to the failed job"
        required: false
        type: string
        default: ""
      run-url:
        description: "Override for the run link in the Slack message. Needed when this reusable is invoked from a workflow_run-triggered catch-all, where github.run_id would otherwise point at the notifier itself rather than the failed run."
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK_RELEASE_ALERTS:
        description: "Slack webhook for #ci-alerts. Optional; when empty the notify step emits a ::warning:: instead of a Slack message so nested callers don't trip a graph-build error."
        required: false

permissions: {}

jobs:
  notify:
    name: Post failure to Slack
    # Temporarily mute Codex-* workflow failures — the shared Codex jobs
    # (codex-security-fix, codex-semver-fix) are currently broken and would
    # otherwise spam #ci-alerts every night from ~70 repos. Remove this
    # guard once the underlying Codex failures are fixed.
    if: ${{ !startsWith(inputs.workflow-name, 'Codex ') }}
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        run: |
          set -euo pipefail

          repo="${{ inputs.repo }}"
          tier="${{ inputs.tier }}"
          step="${{ inputs.step }}"
          error="${{ inputs.error }}"
          details="${{ inputs.details }}"
          job_url="${{ inputs.job-url }}"
          run_url_override="${{ inputs.run-url }}"
          if [ -n "$run_url_override" ]; then
            run_url="$run_url_override"
          else
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          text=":red_circle: *${{ inputs.workflow-name }}* failed"

          if [ -n "$repo" ]; then
            text="${text}\n*Repo:* ${repo}"
          fi
          if [ -n "$tier" ]; then
            text="${text} (tier ${tier})"
          fi
          if [ -n "$step" ]; then
            text="${text}\n*Step:* ${step}"
          fi
          if [ -n "$error" ]; then
            text="${text}\n*Error:* ${error}"
          fi
          if [ -n "$details" ]; then
            text="${text}\n${details}"
          fi
          if [ -n "$job_url" ]; then
            text="${text}\n*Failed job:* <${job_url}|Open failed downstream job>"
          fi
          text="${text}\n*Run:* <${run_url}|View workflow run>"

          # Escape for JSON
          text=$(echo -e "$text" | jq -Rs .)
          echo "payload={\"text\":${text}}" >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_RELEASE_ALERTS }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_RELEASE_ALERTS not provided; skipping Slack post. Pass 'secrets: inherit' from the caller workflow to enable alerts."
            exit 0
          fi
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H 'Content-type: application/json' \
            --data '${{ steps.msg.outputs.payload }}' \
            "${SLACK_URL}")

          if [ "$response" -ne 200 ]; then
            echo "::warning::Slack notification failed (HTTP ${response})"
          else
            echo "Slack notification sent"
          fi
