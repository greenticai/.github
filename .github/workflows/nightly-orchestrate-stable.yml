name: Orchestrate Stable Release

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Process a specific tier only (empty = all tiers 0-8)'
        required: false
        type: string
        default: ''
      skip-prepare:
        description: 'Skip the prepare phase (use existing release PRs)'
        required: false
        type: boolean
        default: false
      auto-merge-timeout:
        description: 'Minutes to wait for PR merges per tier (0 = no waiting, require pre-merged)'
        required: false
        type: string
        default: '60'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  orchestrate:
    name: Tier-ordered stable release
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.run.outputs.summary }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Mint GitHub App token (org-wide)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GREENTIC_CI_APP_ID }}
          private-key: ${{ secrets.GREENTIC_CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Orchestrate stable release
        id: run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_TIER: ${{ inputs.tier }}
          INPUT_SKIP_PREPARE: ${{ inputs.skip-prepare }}
          INPUT_MERGE_TIMEOUT: ${{ inputs.auto-merge-timeout }}
        run: bash scripts/nightly-orchestrate-stable.sh

  notify-success:
    name: Notify on success
    needs: [orchestrate]
    if: success()
    uses: ./.github/workflows/notify-success.yml
    with:
      workflow-name: orchestrate-stable
      details: ${{ needs.orchestrate.outputs.summary }}
    secrets:
      SLACK_WEBHOOK_RELEASE_ALERTS: ${{ secrets.SLACK_WEBHOOK_RELEASE_ALERTS }}

  notify-failure:
    name: Notify on failure
    needs: [orchestrate]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow-name: orchestrate-stable
      step: orchestration
      error: "Stable release orchestration failed — check the run log"
    secrets:
      SLACK_WEBHOOK_RELEASE_ALERTS: ${{ secrets.SLACK_WEBHOOK_RELEASE_ALERTS }}
