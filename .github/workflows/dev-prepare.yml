name: Dev Prepare

# Reusable workflow that runs fmt/clippy/build/test for the develop lane
# and computes the stamped dev version `{M.m.GITHUB_RUN_ID}`. The version
# output is consumed by dev-release-binaries.yml (to build + name archives)
# and dev-publish.yml (to stamp Cargo.toml before cargo publish).
#
# This runs FIRST in the dev lane so that dev-publish.yml (which actually
# pushes to crates.io) can be ordered AFTER dev-release-binaries.yml. If
# a binary build fails, cargo publish never runs — no orphan crate version
# left on crates.io without matching binaries.
#
# Caller pattern (emitted by sync-dev-publish.sh):
#
#   jobs:
#     dev-prepare:
#       uses: greenticai/.github/.github/workflows/dev-prepare.yml@main
#       secrets: inherit
#     dev-binaries-<pkg>:
#       needs: dev-prepare
#       uses: greenticai/.github/.github/workflows/dev-release-binaries.yml@main
#       with: { version: ${{ needs.dev-prepare.outputs.version }}, ... }
#     dev-publish:
#       needs: [dev-prepare, dev-binaries-<pkg>]
#       uses: greenticai/.github/.github/workflows/dev-publish.yml@main
#       with: { version: ${{ needs.dev-prepare.outputs.version }}, ... }
#       secrets: inherit

on:
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "1.95.0"
      run-tests:
        description: "Run fmt/clippy/build/test before exporting version"
        type: boolean
        default: true
      setup-script:
        description: "Optional shell commands to run before build (e.g., ci/setup.sh)"
        type: string
        default: ""
      wasm-target:
        description: "Add wasm32-wasip2 target for WASM component repos"
        type: boolean
        default: false
      exclude-crates:
        description: "Space-separated crate names to exclude from build/clippy/test (WASM components that can't build natively)"
        type: string
        default: ""
      require-pre-release:
        description: "If true, require Cargo.toml base to be on `M.m.p-dev.N` pre-release form. Set by binary-bifurcated repos so dev publishes don't pollute the stable `<name>` namespace on crates.io. See plans/binary-bifurcation.md (2026-04-27 update)."
        type: boolean
        default: false
    outputs:
      version:
        description: "Stamped LIBRARY version (alias retained for backward compatibility — equals `lib-version`). Form depends on Cargo.toml base: `M.m.p-dev.{GITHUB_RUN_ID}` if base is pre-release `M.m.p-dev.N` (preferred for binary-bifurcated repos — sorts below stable on crates.io), else `{major}.{minor}.{GITHUB_RUN_ID}` regular release. Used to stamp the workspace and publish library crates under `<name>`."
        value: ${{ jobs.compute-version.outputs.version }}
      lib-version:
        description: "Explicit alias of `version` — the LIBRARY version. Used to stamp Cargo.toml across the workspace. For binary-bifurcated dual-role repos, this is intentionally pre-release so dev publishes of `<name>` libraries don't preempt stable on crates.io."
        value: ${{ jobs.compute-version.outputs.version }}
      binary-version:
        description: "Stamped BINARY version (regular release `{major}.{minor}.{GITHUB_RUN_ID}`). Used by binary-bifurcated repos for the `<name>-dev` crates.io publish + binstall archive naming. Regular release (not pre-release) so `cargo binstall <name>-dev` resolves without `--version` flags. For repos on a regular-release Cargo.toml base, this equals `lib-version`."
        value: ${{ jobs.compute-version.outputs.binary }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    name: CI (fmt / clippy / build / test)
    if: inputs.run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt, clippy
          targets: ${{ inputs.wasm-target && 'wasm32-wasip2' || '' }}
      - uses: Swatinem/rust-cache@v2

      - name: Run setup script
        if: inputs.setup-script != ''
        run: ${{ inputs.setup-script }}

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: |
          excludes=""
          for c in ${{ inputs.exclude-crates }}; do excludes="$excludes --exclude $c"; done
          cargo clippy --workspace --all-targets --all-features $excludes -- -D warnings

      - name: build
        run: |
          excludes=""
          for c in ${{ inputs.exclude-crates }}; do excludes="$excludes --exclude $c"; done
          cargo build --workspace --all-features $excludes

      - name: test
        run: |
          excludes=""
          for c in ${{ inputs.exclude-crates }}; do excludes="$excludes --exclude $c"; done
          cargo test --workspace --all-features $excludes -- --nocapture

  compute-version:
    name: Compute stamped dev version
    needs: [build-test]
    if: always() && (needs.build-test.result == 'success' || needs.build-test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.stamp.outputs.dev }}
      binary: ${{ steps.stamp.outputs.binary }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract base version
        id: base
        uses: greenticai/.github/.github/actions/extract-cargo-version@main

      - name: Stamp dev version
        id: stamp
        env:
          BASE: ${{ steps.base.outputs.version }}
          REQUIRE_PRE_RELEASE: ${{ inputs.require-pre-release }}
        run: |
          set -euo pipefail

          # Two stamping forms:
          #
          # 1. Pre-release `M.m.p-dev.{RUN_ID}` (preferred for binary-bifurcated
          #    repos per plans/binary-bifurcation.md 2026-04-27 update). Cargo.toml
          #    base must be `M.m.p-dev.N`; ${BASE%.*} strips `.N` leaving
          #    `M.m.p-dev`, then append RUN_ID. Pre-release versions sort BELOW
          #    stable on crates.io, so dual-role library publishes don't
          #    preempt the stable `<name>` namespace. Range matching against
          #    workspace specs `>=M.m.0-0, <M.next.0-0` works because patch
          #    stays at 0 — same M.m.p on version + comparator.
          #
          # 2. Regular `{major}.{minor}.{RUN_ID}` (legacy form, allowed for
          #    same-name library repos that haven't adopted the pre-release
          #    minor-bump lane yet). Cargo.toml base is `M.m.p` regular release;
          #    ${BASE%.*} strips `.p` leaving `M.m`, then append RUN_ID. WARNING:
          #    on dual-role repos this pollutes the stable `<name>` namespace —
          #    set `require-pre-release: true` on the caller to forbid this.
          if [[ "${BASE}" =~ ^([0-9]+\.[0-9]+)\.[0-9]+-dev\.[0-9]+$ ]]; then
            kind="pre-release"
            major_minor="${BASH_REMATCH[1]}"
          elif [[ "${BASE}" =~ ^([0-9]+\.[0-9]+)\.[0-9]+$ ]]; then
            kind="regular"
            major_minor="${BASH_REMATCH[1]}"
            if [[ "${REQUIRE_PRE_RELEASE}" == "true" ]]; then
              echo "::error::Cargo.toml base '${BASE}' is regular-release form, but require-pre-release=true."
              echo "::error::Binary-bifurcated repos must adopt 'M.next.0-dev.0' base on develop to prevent stable namespace pollution on crates.io."
              echo "::error::See plans/binary-bifurcation.md 2026-04-27 update + plans/pre-release-minor-bump-lane.md Phase 2."
              exit 1
            fi
          else
            echo "::error::Cargo.toml base '${BASE}' does not match supported forms 'M.m.p' or 'M.m.p-dev.N'."
            exit 1
          fi
          # `dev` is the LIBRARY version (alias `lib-version`). For pre-release
          # base it preserves the pre-release suffix so the lib publish sorts
          # below stable on crates.io. For regular base it's just M.m.{RUN_ID}.
          major_minor_patch="${BASE%.*}"
          dev="${major_minor_patch}.${GITHUB_RUN_ID}"
          # `binary` is the BINARY version — always regular release
          # M.m.{RUN_ID} regardless of base form, so `cargo binstall <name>-dev`
          # resolves without `--version` flags. For regular-base repos this
          # equals `dev`; for pre-release-base repos this is the same M.m
          # (next minor) but without the `-dev.0` suffix.
          binary="${major_minor}.${GITHUB_RUN_ID}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "dev=${dev}" >> "$GITHUB_OUTPUT"
          echo "binary=${binary}" >> "$GITHUB_OUTPUT"
          echo "Computed dev version (${kind}):"
          echo "  ${BASE} → lib=${dev}"
          echo "  ${BASE} → binary=${binary}"
