name: Release Binaries

# Reusable workflow that builds release binaries for 6 targets (Linux x86_64/arm64,
# macOS intel/arm64, Windows x86_64/arm64), packages them as archives with sha256
# checksums, attaches them to the GitHub Release for the current tag, and
# optionally pushes them to GHCR as OCI artifacts for cargo-binstall.
#
# Called by per-repo wrapper workflows triggered on tag push. The caller passes
# the cargo package name, binary name, and any extra files to include in the
# archive. Designed to replace the legacy per-repo publish.yml binary-release
# logic in greentic-flow, greentic-sorla, greentic-bundle.

on:
  workflow_call:
    inputs:
      package:
        description: "Cargo package name to build (passed to cargo build -p)"
        required: true
        type: string
      binary:
        description: "Binary name (the executable file name, without .exe suffix)"
        required: true
        type: string
      rust-version:
        description: "Rust toolchain version"
        required: false
        type: string
        default: "1.94.0"
      extra-files:
        description: "Newline-separated list of repo-root files to include alongside the binary in the archive (e.g. README.md, LICENSE)"
        required: false
        type: string
        default: ""
      windows-archive-format:
        description: "Archive format for Windows targets: 'tar.gz' or 'zip'"
        required: false
        type: string
        default: "tar.gz"
      publish-ghcr:
        description: "Also push each archive to GHCR as an OCI artifact (for binstall)"
        required: false
        type: boolean
        default: false
      generate-release-notes:
        description: "Auto-generate release notes if the release doesn't already exist"
        required: false
        type: boolean
        default: true
    secrets:
      GHCR_TOKEN:
        description: "Optional PAT for GHCR push; falls back to GITHUB_TOKEN"
        required: false

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os: linux
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os: macos
          - runner: macos-15
            target: aarch64-apple-darwin
            os: macos
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            os: windows
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            os: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-binaries-${{ matrix.target }}

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::release-binaries.yml must be called from a tag-triggered workflow (ref_type=${GITHUB_REF_TYPE})"
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        run: |
          cargo build --release --locked \
            --target "${{ matrix.target }}" \
            --package "${{ inputs.package }}" \
            --bin "${{ inputs.binary }}"

      - name: Package archive (tar.gz)
        if: matrix.os != 'windows' || inputs.windows-archive-format == 'tar.gz'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
          BINARY: ${{ inputs.binary }}
          EXTRA_FILES: ${{ inputs.extra-files }}
          OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          bin_suffix=""
          if [[ "${OS}" == "windows" ]]; then
            bin_suffix=".exe"
          fi
          stem="${BINARY}-v${VERSION}-${TARGET}"
          mkdir -p "dist/${stem}"
          cp "target/${TARGET}/release/${BINARY}${bin_suffix}" "dist/${stem}/${BINARY}${bin_suffix}"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -f "$f" ]; then
              cp "$f" "dist/${stem}/"
            else
              echo "::warning::extra-file not found: $f"
            fi
          done <<< "${EXTRA_FILES}"
          tar -C dist -czf "dist/${stem}.tar.gz" "${stem}"
          rm -rf "dist/${stem}"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${stem}.tar.gz" > "${stem}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${stem}.tar.gz" > "${stem}.tar.gz.sha256")
          fi

      - name: Package archive (zip)
        if: matrix.os == 'windows' && inputs.windows-archive-format == 'zip'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
          BINARY: ${{ inputs.binary }}
          EXTRA_FILES: ${{ inputs.extra-files }}
        run: |
          $ErrorActionPreference = 'Stop'
          $stem = "$env:BINARY-v$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$stem" | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BINARY.exe" "dist/$stem/$env:BINARY.exe"
          if ($env:EXTRA_FILES) {
            foreach ($f in $env:EXTRA_FILES -split "`n") {
              $f = $f.Trim()
              if ($f -and (Test-Path $f)) {
                Copy-Item $f "dist/$stem/"
              } elseif ($f) {
                Write-Host "::warning::extra-file not found: $f"
              }
            }
          }
          Compress-Archive -Path "dist/$stem/*" -DestinationPath "dist/$stem.zip" -Force
          Remove-Item -Recurse -Force "dist/$stem"
          $hash = (Get-FileHash "dist/$stem.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$stem.zip.sha256" -Value "$hash  $stem.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  attach-to-release:
    name: Attach binaries to GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-*
          merge-multiple: true
          path: dist

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GENERATE_NOTES: ${{ inputs.generate-release-notes }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            notes_flag=""
            if [[ "${GENERATE_NOTES}" == "true" ]]; then
              notes_flag="--generate-notes"
            else
              notes_flag="--notes="""
            fi
            gh release create "${TAG}" --title "${TAG}" ${notes_flag}
          fi

      - name: Upload archives to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No archives found in dist/"
            exit 1
          fi
          gh release upload "${TAG}" "${files[@]}" --clobber

  ghcr-publish:
    name: Push archives to GHCR
    if: inputs.publish-ghcr
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-*
          merge-multiple: true
          path: dist

      - uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          token="${GHCR_TOKEN:-${GITHUB_TOKEN}}"
          printf '%s' "$token" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Push OCI artifacts
        env:
          TAG: ${{ github.ref_name }}
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          repo_lower="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          for asset in dist/*; do
            [ -f "$asset" ] || continue
            filename="$(basename "$asset")"
            safe_filename="$(printf '%s' "$filename" | tr '/:' '--')"
            ref="ghcr.io/${repo_lower}/${PACKAGE}:${version}-${safe_filename}"
            echo "Pushing ${ref}"
            oras push "$ref" \
              --annotation "org.opencontainers.image.title=${filename}" \
              --annotation "org.opencontainers.image.version=${version}" \
              --artifact-type application/vnd.greentic.binstall.archive \
              "${asset}:application/octet-stream"
          done
