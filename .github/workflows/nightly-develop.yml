name: Nightly Develop

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:
    inputs:
      tier:
        description: 'Process a specific tier only (empty = all tiers 0-8)'
        required: false
        type: string
        default: ''
      force:
        description: 'Skip change detection — publish all repos'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  orchestrate:
    name: Tier-ordered dev publish
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.run.outputs.summary }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Mint GitHub App token (org-wide)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GREENTIC_CI_APP_ID }}
          private-key: ${{ secrets.GREENTIC_CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Orchestrate dev publishing
        id: run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_TIER: ${{ inputs.tier }}
          INPUT_FORCE: ${{ inputs.force }}
        run: bash scripts/nightly-develop-orchestrate.sh

  notify-success:
    name: Notify on success
    needs: [orchestrate]
    if: success()
    uses: ./.github/workflows/notify-success.yml
    with:
      workflow-name: nightly-develop
      details: ${{ needs.orchestrate.outputs.summary }}
    secrets:
      SLACK_WEBHOOK_RELEASE_ALERTS: ${{ secrets.SLACK_WEBHOOK_RELEASE_ALERTS }}

  notify-failure:
    name: Notify on failure
    needs: [orchestrate]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow-name: nightly-develop
      step: orchestration
      error: "Nightly dev-publish orchestration failed — check the run log"
    secrets:
      SLACK_WEBHOOK_RELEASE_ALERTS: ${{ secrets.SLACK_WEBHOOK_RELEASE_ALERTS }}
