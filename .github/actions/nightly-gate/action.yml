name: "Nightly Change Gate"
description: >
  Decides whether a scheduled nightly workflow should actually run by
  comparing the current commit SHA to the head_sha of the most recent
  successful scheduled run of the same workflow. Explicit dispatches and
  first-ever runs always proceed.

inputs:
  github-token:
    description: "Token used to query gh run list. Defaults to GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

outputs:
  should-run:
    description: "'true' if downstream jobs should proceed, 'false' to short-circuit."
    value: ${{ steps.gate.outputs.should-run }}

runs:
  using: "composite"
  steps:
    - id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EVENT_NAME: ${{ github.event_name }}
        WORKFLOW: ${{ github.workflow }}
        HEAD_SHA: ${{ github.sha }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        emit() {
          local should_run="$1"
          local reason="$2"
          echo "should-run=${should_run}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Nightly gate"
            echo ""
            echo "- **Event:** \`${EVENT_NAME}\`"
            echo "- **Workflow:** \`${WORKFLOW}\`"
            echo "- **HEAD:** \`${HEAD_SHA}\`"
            echo "- **Decision:** \`${should_run}\` — ${reason}"
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "gate: should-run=${should_run} (${reason})"
        }

        if [ "${EVENT_NAME}" != "schedule" ]; then
          emit true "non-schedule event (${EVENT_NAME:-unknown}) always runs"
          exit 0
        fi

        last_sha=$(gh run list \
          --repo "${REPO}" \
          --workflow "${WORKFLOW}" \
          --status success \
          --event schedule \
          --limit 1 \
          --json headSha \
          --jq '.[0].headSha // ""' 2>/dev/null || echo "")

        if [ -z "${last_sha}" ]; then
          emit true "no prior successful scheduled run — establishing baseline"
          exit 0
        fi

        if [ "${last_sha}" = "${HEAD_SHA}" ]; then
          emit false "unchanged since last successful scheduled run (${last_sha})"
          exit 0
        fi

        emit true "changed since last successful scheduled run (${last_sha} → ${HEAD_SHA})"
